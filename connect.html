<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glade — Connect</title>
  <meta name="description" content="Get in touch to bring intelligence, structure, and speed to your organization's ecosystems.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/elevated.css">
  <link rel="stylesheet" href="css/narrative.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    .connect-header {
      min-height: 45vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 12vh var(--space-md) 2vh;
    }
    .connect-content {
      padding: 2vh var(--space-md) 16vh;
    }
    .form-wrapper {
      max-width: 600px;
      margin: 4vh auto 0;
      background: rgba(var(--surface-rgb), 0.2);
      border: 1px solid rgba(var(--mint-mist-rgb), 0.08);
      border-radius: 32px;
      padding: var(--space-lg) var(--space-md);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
      opacity: 0;
      transform: translateY(30px);
      transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .form-wrapper.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .success-message {
      display: none;
      text-align: center;
      padding: var(--space-md) 0;
    }
    .success-message h3 {
      font-size: 1.8rem;
      color: var(--life-spring);
      margin-bottom: 2vh;
    }
    .success-message p {
      font-size: 1.05rem;
      line-height: 1.7;
      opacity: 0.8;
      margin: 0 auto;
      max-width: 440px;
    }
  </style>
</head>
<body>
  <div class="page-transition-overlay"></div>

  <canvas id="atmosCanvas"></canvas>
  <div id="scrollProgress"></div>

  <!-- Mobile Overlay -->
  <div class="mobile-overlay">
    <a href="index.html">Home</a>
    <a href="approach.html">Approach</a>
    <a href="how-it-works.html">How It Works</a>
    <a href="ecosystem.html">Ecosystems</a>
    <a href="projects.html">Projects</a>
    <a href="connect.html" class="active">Connect</a>
  </div>

  <!-- Navbar -->
  <nav id="navbar">
    <div class="nav-inner">
      <div class="nav-logo"><a href="index.html" style="color: inherit;">glade.</a></div>
      <button class="menu-toggle" aria-label="Menu">
        <span></span><span></span>
      </button>
      <div class="nav-links">
        <a href="approach.html">Approach</a>
        <a href="how-it-works.html">How It Works</a>
        <a href="ecosystem.html">Ecosystems</a>
        <a href="projects.html">Projects</a>
        <a href="connect.html" class="active">Connect</a>
      </div>
    </div>
  </nav>

  <!-- Main Section -->
  <section class="connect-header">
    <h1 id="page-title" class="hero-headline split-text">Loading Connect...</h1>
    <p id="page-subtitle" class="hero-subheadline reveal-up" style="max-width: 800px; margin-top: 4vh; font-size: 1.2rem;"></p>
  </section>

  <section class="connect-content particle-target-section" data-shape="contact">
    <div class="section-divider"></div>
    <p id="page-info" class="reveal-up" style="text-align: center; max-width: 650px; margin: 0 auto; font-size: 1.15rem; line-height: 1.9; opacity: 0.8;"></p>
    
    <div class="form-wrapper" id="connect-form-wrapper">
      <form id="connect-form">
        <div class="form-group">
          <input type="text" id="name" placeholder=" " required>
          <label for="name">Your Name</label>
        </div>
        <div class="form-group">
          <input type="text" id="company" placeholder=" " required>
          <label for="company">Your Organization</label>
        </div>
        <div class="form-group">
          <input type="email" id="email" placeholder=" " required>
          <label for="email">Email Address</label>
        </div>
        <div class="form-group">
          <textarea id="message" placeholder=" " rows="4" required></textarea>
          <label for="message">Tell us about your data bottleneck</label>
        </div>
        <button type="submit" class="btn-submit magnetic" id="submit-btn" style="width: 100%; justify-content: center; margin-top: 4vh;">
          <span class="btn-text">Start the integration.</span>
          <svg class="btn-sprout" viewBox="0 0 28 28" fill="none" style="margin-left: 10px;">
            <line x1="14" y1="28" x2="14" y2="12" stroke="#6FBF4A" stroke-width="2" stroke-linecap="round"/>
            <path d="M14 12 Q8 4 4 0 Q10 5 14 10" fill="#6FBF4A"/>
            <path d="M14 12 Q20 4 24 0 Q18 5 14 10" fill="#6FBF4A"/>
          </svg>
        </button>
      </form>

      <div class="success-message" id="success-message">
        <h3 id="success-title">Message Sent</h3>
        <p id="success-text"></p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-brand"><a href="index.html" style="color: inherit;">glade.</a></div>
    <div class="footer-links">
      <a href="approach.html">Approach</a>
      <a href="projects.html">Projects</a>
      <a href="connect.html">Contact</a>
    </div>
    <p class="footer-copy">&copy; 2026 Glade. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/store.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/main.js"></script>
  <script src="js/canvas-engine.js"></script>

  <script>
    // Fetch page data from REST API
    async function loadContent() {
      try {
        const response = await fetch('/api/pages/connect');
        const data = await response.json();

        // Inject content
        document.title = `Glade — ${data.title}`;
        document.getElementById('page-title').innerText = data.title;
        document.getElementById('page-subtitle').innerText = data.subtitle;
        document.getElementById('page-info').innerText = data.info;

        // Trigger reveal animations
        setTimeout(() => {
          document.getElementById('connect-form-wrapper').classList.add('visible');
          
          // Trigger split text for title
          const titleEl = document.getElementById('page-title');
          const text = titleEl.innerText;
          titleEl.innerHTML = '';
          text.split(' ').forEach((word, i) => {
            const span = document.createElement('span');
            span.classList.add('split-word');
            span.innerText = word;
            span.style.transitionDelay = `${i * 0.045}s`;
            titleEl.appendChild(span);
            if (i < text.split(' ').length - 1) titleEl.appendChild(document.createTextNode(' '));
          });
          titleEl.classList.add('visible');
        }, 100);

      } catch (err) {
        console.error('Failed to load page content from API', err);
      }
    }

    // Submit form via REST API POST call
    document.getElementById('connect-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const company = document.getElementById('company').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;
      const submitBtn = document.getElementById('submit-btn');

      submitBtn.disabled = true;
      submitBtn.querySelector('.btn-text').innerText = 'Sending...';

      try {
        const response = await fetch('/api/submit-connect', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, company, email, message })
        });

        const data = await response.json();

        if (response.ok) {
          // Hide form, show success message
          document.getElementById('connect-form').style.display = 'none';
          const successDiv = document.getElementById('success-message');
          document.getElementById('success-text').innerText = data.message;
          successDiv.style.display = 'block';
        } else {
          submitBtn.disabled = false;
          submitBtn.querySelector('.btn-text').innerText = 'Start the integration.';
          alert('Submission failed. Please try again.');
        }

      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.querySelector('.btn-text').innerText = 'Start the integration.';
        console.error('Form submission failed', err);
        alert('Network error. Please check your connection.');
      }
    });

    window.addEventListener('DOMContentLoaded', loadContent);
  </script>
</body>
</html>
