<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glade — Ecosystems</title>
  <meta name="description" content="AI ecosystems built specifically for Law, Real Estate, and Legacy Enterprise.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/elevated.css">
  <link rel="stylesheet" href="css/narrative.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <style>
    .eco-header {
      min-height: 50vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 12vh var(--space-md) 4vh;
    }
    .eco-content {
      padding: 4vh var(--space-md) 16vh;
    }
    .eco-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: var(--space-lg);
      max-width: 1200px;
      margin: 8vh auto 0;
    }
    .eco-detail-card {
      background: rgba(var(--surface-rgb), 0.25);
      border: 1px solid rgba(var(--mint-mist-rgb), 0.06);
      border-radius: 28px;
      padding: var(--space-lg) var(--space-md);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(40px);
    }
    .eco-detail-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .eco-detail-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 29px;
      background: linear-gradient(160deg, rgba(111,191,74,0.12), transparent 35%, transparent 65%, rgba(61,107,94,0.1));
      z-index: -1;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .eco-detail-card:hover::before {
      opacity: 1;
    }
    .eco-detail-card:hover {
      border-color: rgba(var(--life-spring-rgb), 0.1);
      box-shadow: 0 30px 80px rgba(0,0,0,0.35), 0 0 50px rgba(var(--life-spring-rgb), 0.05);
      transform: translateY(-8px);
    }
    .eco-detail-card h3 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      color: var(--life-spring);
      text-transform: uppercase;
      margin-bottom: 3vh;
    }
    .eco-detail-card p {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--deep-earth-dark);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="page-transition-overlay"></div>

  <canvas id="atmosCanvas"></canvas>
  <div id="scrollProgress"></div>

  <!-- Mobile Overlay -->
  <div class="mobile-overlay">
    <a href="index.html">Home</a>
    <a href="approach.html">Approach</a>
    <a href="how-it-works.html">How It Works</a>
    <a href="ecosystem.html" class="active">Ecosystems</a>
    <a href="projects.html">Projects</a>
    <a href="connect.html">Connect</a>
  </div>

  <!-- Navbar -->
  <nav id="navbar">
    <div class="nav-inner">
      <div class="nav-logo"><a href="index.html" style="color: inherit;">glade.</a></div>
      <button class="menu-toggle" aria-label="Menu">
        <span></span><span></span>
      </button>
      <div class="nav-links">
        <a href="approach.html">Approach</a>
        <a href="how-it-works.html">How It Works</a>
        <a href="ecosystem.html" class="active">Ecosystems</a>
        <a href="projects.html">Projects</a>
        <a href="connect.html">Connect</a>
      </div>
    </div>
  </nav>

  <!-- Main Section -->
  <section class="eco-header">
    <h1 id="page-title" class="hero-headline split-text">Loading Ecosystems...</h1>
    <p id="page-subtitle" class="hero-subheadline reveal-up" style="max-width: 800px; margin-top: 4vh; font-size: 1.2rem;"></p>
  </section>

  <section class="eco-content particle-target-section" data-shape="ecosystems">
    <div class="section-divider"></div>
    
    <div class="eco-grid" id="ecosystems-container">
      <!-- Dynamically Injected Ecosystems -->
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-brand"><a href="index.html" style="color: inherit;">glade.</a></div>
    <div class="footer-links">
      <a href="approach.html">Approach</a>
      <a href="projects.html">Projects</a>
      <a href="connect.html">Contact</a>
    </div>
    <p class="footer-copy">&copy; 2026 Glade. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/store.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/main.js"></script>
  <script src="js/canvas-engine.js"></script>

  <script>
    // Fetch page data from REST API
    async function loadContent() {
      try {
        const response = await fetch('/api/pages/ecosystem');
        const data = await response.json();

        // Inject content
        document.title = `Glade — ${data.title}`;
        document.getElementById('page-title').innerText = data.title;
        document.getElementById('page-subtitle').innerText = data.subtitle;

        // Render ecosystem cards
        const container = document.getElementById('ecosystems-container');
        container.innerHTML = '';
        data.integrations.forEach((item, index) => {
          const card = document.createElement('div');
          card.className = 'eco-detail-card tilt-card';
          card.style.transitionDelay = `${index * 0.15}s`;
          card.innerHTML = `
            <h3>${item.industry}</h3>
            <p>${item.useCase}</p>
          `;
          container.appendChild(card);
        });

        // Trigger reveal animations
        setTimeout(() => {
          document.querySelectorAll('.eco-detail-card').forEach(el => el.classList.add('visible'));
          
          // Re-initialize 3D tilt cards
          document.querySelectorAll('.tilt-card').forEach(card => {
            card.addEventListener('mousemove', function(e) {
              const rect = this.getBoundingClientRect();
              const x = (e.clientX - rect.left) / rect.width - 0.5;
              const y = (e.clientY - rect.top) / rect.height - 0.5;
              this.style.transform = `perspective(800px) rotateX(${y * -10}deg) rotateY(${x * 10}deg) scale3d(1.02, 1.02, 1.02)`;
            });
            card.addEventListener('mouseleave', function() {
              this.style.transform = 'perspective(800px) rotateX(0) rotateY(0) scale3d(1,1,1)';
            });
          });

          // Trigger split text for title
          const titleEl = document.getElementById('page-title');
          const text = titleEl.innerText;
          titleEl.innerHTML = '';
          text.split(' ').forEach((word, i) => {
            const span = document.createElement('span');
            span.classList.add('split-word');
            span.innerText = word;
            span.style.transitionDelay = `${i * 0.045}s`;
            titleEl.appendChild(span);
            if (i < text.split(' ').length - 1) titleEl.appendChild(document.createTextNode(' '));
          });
          titleEl.classList.add('visible');
        }, 100);

      } catch (err) {
        console.error('Failed to load page content from API', err);
      }
    }

    window.addEventListener('DOMContentLoaded', loadContent);
  </script>
</body>
</html>
